services:

  # ─── Base de datos ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: equilibria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equilibria_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equilibria_pass}
      POSTGRES_DB: ${POSTGRES_DB:-equilibria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equilibria_user} -d ${POSTGRES_DB:-equilibria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - equilibria_net

  # ─── Aplicación ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equilibria_app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-equilibria_user}:${POSTGRES_PASSWORD:-equilibria_pass}@postgres:5432/${POSTGRES_DB:-equilibria_db}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      TWILIO_CONTENT_SID: ${TWILIO_CONTENT_SID}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - equilibria_net

volumes:
  postgres_data:

networks:
  equilibria_net:
    driver: bridge
